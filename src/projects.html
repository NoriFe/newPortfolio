<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects - Norbert Skwierczynski</title>
    <link href="./index.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./images/favicon.ico" />
    <meta name="description" content="Projects - Production-focused applications" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Projects - Norbert Skwierczynski" />
    <meta property="og:description" content="Production-focused applications built with clean architecture and strong user experience." />
  </head>
  <body class="font-dmsans bg-bg text-white">
    <main>
      <header class="py-3 md:py-6 sticky top-0 bg-bg/40 backdrop-blur-lg px-4">
        <div class="flex justify-between gap-4 max-w-maxW mx-auto">
          <div class="flex gap-4 items-center">
            <a href="index.html"><img class="w-10 h-10 animate-slowSpin" src="./images/logo.svg" alt="Logo" /></a>
            <div>
              <p class="text-xl font-bold text-accent">Norbert Skwierczynski</p>
              <p aria-label="Full-Stack Developer and Cybersecurity Enthusiast" class="text-white opacity-40 uppercase text-xs tracking-wider">
                Full-Stack Developer | Cybersecurity
              </p>
            </div>
          </div>
          <nav class="hidden md:block">
            <ul class="flex gap-10 font-bold items-center">
              <li><a href="index.html#about">About</a></li>
              <li><a href="index.html#skills">Skills</a></li>
              <li><a class="text-accent" aria-current="page" href="projects.html">Projects</a></li>
              <li><a href="lab.html">Lab</a></li>
              <li><a class="inline-block bg-accent text-bg rounded-xl py-3.5 px-8" href="index.html#contact">Contact</a></li>
            </ul>
          </nav>
        </div>
      </header>

      <div class="px-4">
        <section class="max-w-maxW mx-auto md:mb-32 mb-20 md:pt-32">
          <p class="text-gray-400 text-xs uppercase tracking-wider mb-4">My Work</p>
          <h1 class="text-3xl md:text-5xl font-bold leading-snug mb-6">Projects</h1>
          <p class="text-2xl md:text-4xl md:max-w-3xl font-medium tracking-tight text-gray-300">
            Projects I built to learn, improve and push myself. Each one taught me something new.
          </p>
        </section>

        <div class="project--js grid gap-4 md:grid-cols-2 px-4 max-w-maxW mx-auto mb-32"></div>

        <footer class="max-w-maxW mx-auto py-10 border-t border-white/10 text-center text-sm text-gray-400">
          <p>Projects and work</p>
        </footer>
      </div>
    </main>

    <script type="module">
      import star from './images/star.svg';
      import demo from './images/demo.svg';
      import source from './images/code.svg';

      const projectContainer = document.querySelector('.project--js');

      const username = 'NoriFe'
      const description = ''

      fetch(`https://api.github.com/users/${username}/repos`)
      .then(response => response.json())
      .then(response => {
          for (let repository of response) {
      const {description, homepage, html_url, name, stargazers_count, topics} = repository;

      let tags =``;
      for (let tag of topics) {
          tags += `<li class="bg-gray-400/10 py-1 px-2 rounded text-sm font-bold">${tag}</li>`
      }


      const element = `<article class="rounded-rad md:rounded-rad-xl overflow-clip bg-gradient-to-br from-white/10 to-white/5 flex flex-col h-full opacity-0 translate-y-4 hover:ring-accent hover:ring-2 hover:shadow-lg transition-all duration-300">
      <div class="border-b border-bg shadow-inner-light rounded-t-rad md:rounded-t-rad-xl flex gap-1.5 p-4 h-11 bg-gradient-to-br from-white/10 to-white/5 ">
          <span class="w-3 h-3 block rounded-full bg-bg opacity-50"></span>
          <span class="w-3 h-3 block rounded-full bg-bg opacity-50"></span>
          <span class="w-3 h-3 block rounded-full bg-bg opacity-50"></span>
      </div>
      <div class="p-5 md:p-6 lg:p-10 flex flex-col justify-between grow ring-1 ring-inset ring-bg">
      <div>
          <header class="mb-4 flex gap-4 items-center">
      <h3 class="text-2xl leading-none font-bold">${name}</h3>
      <p class=" bg-gray-400/10 py-1 px-2 flex gap-0.5 items-center
       text-gray-400 font-medium leading-none rounded">
       <img src="${star}" alt="" class="w-4 h-4" />${stargazers_count}</p>
      </header>
      <p class="text-gray-400 text-xl mb-4">
      ${description}
      </p>
      <ul class="flex gap-2 mb-10 flex-wrap">
      ${tags}

      </ul>
      </div>
      <div class="flex flex-col flex-wrap md:flex-row gap-4 items-start">
      <a class="bg-bg text-accent border-gray-800 border-2 flex gap-3 font-bold  
      py-4 px-5 items-center rounded-rad md:rounded-rad-xl md:text-xl hover:border-accent transition-colors duration-500" rel="noreferrer nofollow" target="_blank" 
      href="${homepage}"><img src="${demo}" class="w-6 h-6" width="24" height="24"alt=""> View demo</a>
      <a class="bg-bg text-accent border-gray-800 border-2 flex gap-3 font-bold  
      py-4 px-5 items-center rounded-rad md:rounded-rad-xl md:text-xl hover:border-accent transition-colors duration-500" rel="noreferrer nofollow" target="_blank" 
      href="${html_url}"><img src="${source}" class="w-6 h-6" width="24" height="24" alt="">Source code</a>
      </div>
      </article>`;
      if (description)
      projectContainer.insertAdjacentHTML('afterbegin', element)
          }

          // animate cards after insertion
          const cards = projectContainer.querySelectorAll('article');
          cards.forEach((card, idx) => {
            setTimeout(() => {
              card.classList.add('opacity-100', 'translate-y-0', 'transition-all', 'duration-500');
            }, idx * 150);
          });
      })
      .catch((e) => console.log(e));
    </script>
  </body>
</html>
